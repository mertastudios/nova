let currentLang = 'en';

let menuOpen = false;

function t(key) {

function setLang(lang) {
    currentLang = lang;
    langMenuOpen = false;
    renderPage();
}
function navigate(page) {
    currentPage = page;
    if (menuOpen) {
        toggleMenu();
    }
    window.scrollTo(0, 0);
    renderPage();
    // Update URL hash
    window.location.hash = page === 'home' ? '' : page;
}
function toggleMenu() {
    menuOpen = !menuOpen;
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    var overlay = document.getElementById('menu-overlay');
    var sidebar = document.getElementById('menu-sidebar');
    var bars = document.querySelectorAll('.hamburger-bar');
    if (overlay && sidebar) {
        if (menuOpen) {
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
        } else {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            overlay.classList.remove('opacity-100');
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0');
        }
    }
    if (bars.length === 3) {
        if (menuOpen) {
            bars[0].classList.add('rotate-45', 'translate-y-[9px]');
            bars[1].classList.add('opacity-0', 'scale-0');
            bars[1].classList.remove('opacity-100');
            bars[2].classList.add('-rotate-45', '-translate-y-[9px]');
        } else {
            bars[0].classList.remove('rotate-45', 'translate-y-[9px]');
            bars[1].classList.remove('opacity-0', 'scale-0');
            bars[1].classList.add('opacity-100');
            bars[2].classList.remove('-rotate-45', '-translate-y-[9px]');
        }
    }
    renderSidebarLinks();
}
function toggleLangMenu() {
    langMenuOpen = !langMenuOpen;
    renderNav();
}
function toggleFaq(idx) {
    const prevIndex = openFaqIndex;
    openFaqIndex = openFaqIndex === idx ? null : idx;
    if (prevIndex !== null && prevIndex !== idx) {
        const pItem = document.getElementById('faq-item-' + prevIndex);
        const pIcon = document.getElementById('faq-icon-' + prevIndex);
        const pContent = document.getElementById('faq-content-' + prevIndex);
        if (pItem) pItem.className = 'bg-slate-900/40 border rounded-xl overflow-hidden transition-all duration-500 border-slate-800';
        if (pIcon) pIcon.classList.remove('rotate-180');
        if (pContent) pContent.className = 'transition-all duration-500 ease-in-out overflow-hidden max-h-0 opacity-0';
    }
    const cItem = document.getElementById('faq-item-' + idx);
    const cIcon = document.getElementById('faq-icon-' + idx);
    const cContent = document.getElementById('faq-content-' + idx);
    if (cItem && cIcon && cContent) {
        const isOpen = openFaqIndex === idx;
        cItem.className = 'bg-slate-900/40 border rounded-xl overflow-hidden transition-all duration-500 ' + (isOpen ? 'border-pink-500/30 shadow-lg shadow-pink-500/5' : 'border-slate-800');
        if (isOpen) cIcon.classList.add('rotate-180'); else cIcon.classList.remove('rotate-180');
        cContent.className = 'transition-all duration-500 ease-in-out overflow-hidden ' + (isOpen ? 'max-h-[500px] opacity-100' : 'max-h-0 opacity-0');
    }
}
function renderSidebarLinks() {
